# Railway (Nixpacks) build for the Caliber API in apps/services.
#
# This repo is a pnpm workspace with no root `start` script, so build and start
# must be explicit — otherwise Nixpacks auto-detect either launches nothing (502)
# or runs the root `build` (turbo → tries to compile the Rust/Odra contracts in a
# Node image, which fails). Both steps below are pinned to avoid that.

[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = [
  'corepack enable',
  'corepack prepare pnpm@9.7.0 --activate',
  # tsx is a runtime dependency, so a prod install still includes it.
  # better-sqlite3 is optional (prod uses Postgres); a skipped native build is fine.
  'pnpm install --frozen-lockfile',
]

# No compile step: the service runs TypeScript directly via tsx.
[phases.build]
cmds = ['echo "caliber: no build step (tsx runs TypeScript directly)"']

[start]
cmd = 'pnpm --filter @caliber/services start'
