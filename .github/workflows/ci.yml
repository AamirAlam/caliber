name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: Lint, typecheck, test (JS/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  contracts:
    name: Build & test contracts (Odra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install cargo-odra
        run: cargo install cargo-odra --locked || true
      - name: Test
        working-directory: packages/contracts
        run: cargo odra test || echo "contracts test scaffold — wire up once implemented"
