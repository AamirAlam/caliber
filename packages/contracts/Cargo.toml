[package]
name = "helm-contracts"
version = "0.1.0"
edition = "2021"
authors = ["Helm"]
description = "Casper treasury-vault contract for Helm, built with Odra."
license = "MIT"

[dependencies]
odra = { version = "2.8.2", features = [], default-features = false }
odra-casper-livenet-env = { version = "2.8.2", optional = true }

[dev-dependencies]
odra-test = { version = "2.8.2", features = [], default-features = false }

[build-dependencies]
odra-build = { version = "2.8.2", features = [], default-features = false }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
odra-build = { version = "2.8.2", features = [], default-features = false }

[features]
# Enables the testnet deploy binary (bin/helm_vault_on_livenet.rs).
livenet = ["odra-casper-livenet-env"]

[[bin]]
name = "helm_contracts_build_contract"
path = "bin/build_contract.rs"
test = false

[[bin]]
name = "helm_contracts_build_schema"
path = "bin/build_schema.rs"
test = false

[[bin]]
name = "helm_vault_on_livenet"
path = "bin/helm_vault_on_livenet.rs"
required-features = ["livenet"]
test = false

[profile.release]
codegen-units = 1
lto = true

[profile.dev.package."*"]
opt-level = 3
