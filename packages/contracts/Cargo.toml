[package]
name = "helm-contracts"
version = "0.1.0"
edition = "2021"
authors = ["Helm"]
description = "Casper treasury-vault contract for Helm, built with Odra."
license = "MIT"

[dependencies]
odra = { version = "2.1.0", default-features = false }
odra-casper-livenet-env = { version = "2.1.0", optional = true }

[dev-dependencies]
odra-test = { version = "2.1.0" }

[features]
# Enables the testnet deploy binary (bin/helm_vault_on_livenet.rs).
livenet = ["odra-casper-livenet-env"]

[lib]
crate-type = ["rlib"]
doctest = false

[[bin]]
name = "helm_vault_on_livenet"
path = "bin/helm_vault_on_livenet.rs"
required-features = ["livenet"]

[profile.release]
codegen-units = 1
lto = true
